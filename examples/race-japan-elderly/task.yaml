task:
  name: Japan Elderly Market Analysis 2050 Rubric
  description: |
    From 2020 to 2050, how many elderly people will there be in Japan? What is their consumption potential across various aspects such as clothing, food, housing, and transportation? Based on population projections, elderly consumer willingness, and potential changes in their consumption habits, please produce a market size analysis report for the elderly demographic.

    Write your report in report.md.

    ## Evaluation Rubric

    Your report is graded across 25 weighted criteria by an LLM judge. Satisfy all of them:

    1. **Detailed Elderly Population Projections (2020-2050)** — Assesses the thoroughness and granularity of Japanese elderly population projections through 2050. This includes coverage of the entire period, use of recognized demographic data/methods, and segmentation by relevant age cohorts (e.g., 65-74, 75-84, 85+), which are crucial for understanding diverse needs within the elderly demographic.
    2. **Thoroughness of Analysis for Specified Consumption Categories (Clothing, Food, Housing, Transportation)** — Evaluates the depth of coverage for *each* of the explicitly requested consumption categories (clothing, food, housing, transportation). This includes current market status, spending patterns, and specific characteristics relevant to the elderly for each sector, as well as the interrelation between these categories.
    3. **Breadth of Coverage: Inclusion of Other Significant Elderly Consumption Categories** — Assesses whether the report expands beyond the mandated categories to cover other significant areas of elderly consumption (e.g., healthcare, leisure, technology, financial services, personal care), reflecting a comprehensive understanding of 'various aspects' of their potential market.
    4. **Depth of Examination of Current Elderly Consumer Willingness and Influencing Factors** — Evaluates the extent to which the report analyzes current factors influencing elderly consumer willingness across key categories. This includes discussion of income levels, savings, health status, existing preferences, cultural nuances, and purchasing power specific to the Japanese elderly.
    5. **Comprehensive Exploration of Potential Future Changes in Elderly Consumption Habits (to 2050)** — Assesses the thoroughness in identifying and discussing potential drivers of change in elderly consumption habits up to 2050. This includes impacts of technological advancements, evolving health and longevity trends, changing family structures, social norms, and economic shifts on their future needs and spending patterns.
    6. **Completeness and Integration of Market Size Estimations (2020-2050)** — Checks if the report provides quantitative market size projections for the analyzed consumption categories, consistently across the 2020-2050 timeframe. Assesses if these estimations are clearly derived from and logically integrated with the population projections and analyses of current/future consumption habits.
    7. **Range and Relevance of Data Sources and Contextual Factors** — Evaluates the breadth of credible and appropriate data sources (e.g., official Japanese government statistics, demographic studies, academic research, reputable market research reports) used to support projections and analyses. Also assesses if key contextual factors (e.g., pension systems, healthcare policies, long-term care infrastructure, societal views on aging in Japan) influencing the elderly market are adequately considered and integrated.
    8. **Depth and Originality in Projecting Changes to Elderly Consumption Habits and Drivers** — Assesses the ability to foresee, analyze, and justify significant and potentially non-obvious shifts in how and why elderly individuals will consume across clothing, food, housing, and transportation over the 2020-2050 period. This includes identifying novel or impactful drivers (e.g., tech adoption, healthspan changes, sustainability concerns) beyond simple extrapolations of current trends.
    9. **Logical Rigor and Sophistication in Synthesizing Diverse Factors for Market Sizing** — Evaluates the strength, coherence, and justification of the analytical framework used to integrate population projections, assessed consumer willingness, and projected consumption habit changes into quantitative market size estimates for each specified sector. Insight is shown by a transparent, robust methodology that handles uncertainty appropriately.
    10. **Nuanced Analysis and Segmentation of Elderly Consumer Willingness** — Assesses if the report provides a deep, evidence-based understanding of the factors influencing elderly consumer willingness to spend. This includes consideration of heterogeneity within the elderly demographic (e.g., by age sub-cohorts, health status, income levels, urban/rural differences) and how willingness might evolve or vary across different consumption categories.
    11. **Insightful Interpretation of Population Projections and their Impact on Consumption Potential** — Evaluates if the report critically engages with the provided population projections, going beyond merely stating numbers. This includes discussing inherent uncertainties, demographic shifts within the elderly cohort (e.g., changing dependency ratios, household structures), and their specific, logically-derived implications for consumption potential in the target sectors.
    12. **Strategic Value and Forward-Looking Nature of Conclusions** — Assesses whether the market size analysis culminates in conclusions that offer significant strategic value, such as identifying overlooked market opportunities, emerging needs, potential disruptive trends, or key challenges for businesses and policymakers. The emphasis is on the foresight and actionability of the insights derived from the overall analysis.
    13. **Direct Provision of Elderly Population Projection (Japan, 2020-2050)** — Assesses if the report directly answers the question regarding the projected number of elderly people in Japan, adhering to the specified 2020-2050 timeframe and geographical focus of Japan.
    14. **Coverage of All Specified Consumption Potential Sectors** — Evaluates if the analysis of consumption potential explicitly covers all four listed sectors: clothing, food, housing, and transportation, as required by the task.
    15. **Utilization of All Mandated Analytical Bases for Market Analysis** — Checks if the market size analysis is explicitly grounded in all three required inputs: population projections, elderly consumer willingness, and potential changes in consumption habits.
    16. **Delivery of 'Market Size Analysis Report' for Elderly Demographic** — Determines if the final output is structured and presented as a 'market size analysis report' specifically for the elderly demographic, fulfilling the primary deliverable instruction.
    17. **Consistent Adherence to Overall Task Scope (Japan, 2020-2050, Elderly)** — Ensures the entire report—including discussions, data, and conclusions—remains strictly focused on the elderly demographic in Japan and the 2020-2050 timeframe, avoiding irrelevant content or scope creep.
    18. **Overall Structure and Navigability** — Assesses if the report has a clear, logical structure (e.g., introduction, population projections, consumption analysis by sector, market size synthesis, conclusion) with distinct, well-labeled heading levels. This is crucial for guiding the reader through the multi-faceted analysis from demographic data to market forecasts across clothing, food, housing, and transportation.
    19. **Clarity, Precision, and Professionalism of Language** — Evaluates if the language is fluent, grammatically correct, unambiguous, and uses precise terminology (e.g., 'elderly demographic,' 'consumption potential,' 'market size,' 'CAGR'). A professional tone suitable for a market analysis report is expected, ensuring accurate conveyance of findings.
    20. **Clarity of Quantitative Data Presentation in Text** — Evaluates how clearly numerical data (e.g., population figures for 2020-2050, consumption values, market sizes for specific sectors) are presented and contextualized within the narrative text. Data should be easy to grasp and directly support the analysis of elderly consumption trends.
    21. **Effectiveness and Clarity of Visualizations (Charts, Tables)** — Assesses if charts (e.g., population projection graphs, market share pies) and tables (e.g., detailed market size breakdowns by year/sector) are used effectively to illustrate trends and comparisons. Visuals must be well-designed, clearly labeled (titles, axes, units, legends), and directly support the report's claims about the elderly market.
    22. **Paragraph Cohesion and Smooth Transitions** — Assesses if each paragraph focuses on a single, clear idea and if transitions between paragraphs and sections (e.g., moving from population analysis to consumer willingness, or between different consumption categories) are smooth and logical, aiding comprehension of the analytical flow.
    23. **Audience Adaptation and Explanation of Terms** — Evaluates if the level of detail, terminology (e.g., related to Japanese demographics, consumer economics, specific market segments), and explanations are appropriate for an audience needing a market size analysis. Specialized concepts should be defined or contextualized to ensure broad understanding without oversimplification.
    24. **Conciseness and Focus** — Evaluates if the report is free of unnecessary jargon, redundancy, and overly verbose explanations. Information should be presented efficiently, maintaining focus on the core task of analyzing market size for the elderly demographic without extraneous details.
    25. **Formatting, Layout, and Visual Appeal** — Assesses if the document's layout (margins, spacing), font choices, paragraphing, and use of lists or bullet points contribute to a professional appearance and ease of prolonged reading, which is important for a potentially dense, data-rich report.
  tips: |-
    - You are evaluated across 4 dimensions: Comprehensiveness, Insight, Instruction Following, and Readability.
    - Each dimension has multiple weighted criteria — see the rubric.
    - Scores are continuous (0-10), not binary pass/fail.
    - Focus on data-driven analysis with quantitative projections.
    - If previous attempts scored low on a dimension, prioritize that area.
